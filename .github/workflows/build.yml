name: Build EXE
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install

      - name: Fetch missing icons
        shell: bash
        run: |
          mkdir -p src-tauri/icons
          curl -L https://raw.githubusercontent.com/tauri-apps/tauri/1.x/tooling/cli/templates/app/src-tauri/icons/icon.ico -o src-tauri/icons/icon.ico
          curl -L https://raw.githubusercontent.com/tauri-apps/tauri/1.x/tooling/cli/templates/app/src-tauri/icons/32x32.png -o src-tauri/icons/32x32.png

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v1.0.${{ github.run_number }}
          releaseName: 'Pro JSON Tool Build ${{ github.run_number }}'
          releaseBody: 'Download your .exe from the Assets section below.'
          releaseDraft: false
          prerelease: false
